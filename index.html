const fmt=v=>{if(!v&&v!==0)return"-";const a=Math.abs(v);return v<0?`(${a.toLocaleString("en-US",{maximumFractionDigits:0})})`:`${a.toLocaleString("en-US",{maximumFractionDigits:0})}`;};
const fmtD=v=>{if(!v&&v!==0)return"-";return v<0?`▼ ${Math.abs(v).toLocaleString("en-US",{maximumFractionDigits:0})}`:`▲ ${v.toLocaleString("en-US",{maximumFractionDigits:0})}`;};

const pDate=str=>{if(!str)return null;const m=str.match(/([A-Za-z]+)\s+(\d{1,2})\s+(\d{4})/);if(m){const d=new Date(`${m[1]} ${m[2]} ${m[3]}`);return isNaN(d)?null:d;}const d=new Date(str);return isNaN(d)?null:d;};
const d2wi=str=>{const d=pDate(str);if(!d)return -1;const y=d.getFullYear(),mo=d.getMonth(),dy=d.getDate();for(let i=0;i<WKS.length;i++){const s=new Date(WKS[i].s),e=new Date(WKS[i].e);const sy=s.getFullYear(),sm=s.getMonth(),sd=s.getDate(),ey=e.getFullYear(),em=e.getMonth(),ed=e.getDate();if(((y>sy)||(y===sy&&mo>sm)||(y===sy&&mo===sm&&dy>=sd))&&((y<ey)||(y===ey&&mo<em)||(y===ey&&mo===em&&dy<=ed)))return i;}return -1;};
const csvSplit=line=>{const cols=[];let c="",q=false;for(let i=0;i<=line.length;i++){const ch=i<line.length?line[i]:"";if(ch==='"'){q=!q;continue;}if((ch===","||i===line.length)&&!q){cols.push(c.trim());c="";}else c+=ch;}return cols;};
const parseTbl=text=>{const lines=text.trim().split("\n").filter(l=>l.trim());if(lines.length<2)return[];const sep=lines[0].includes("\t")?"\t":",";const hdrs=lines[0].split(sep).map(h=>h.trim().replace(/"/g,""));return lines.slice(1).map(line=>{const cols=sep==="\t"?line.split("\t").map(c=>c.trim()):csvSplit(line);const o={};hdrs.forEach((h,i)=>{o[h]=cols[i]||"";});return o;});};

const mRule=(rules,...f)=>{const c=f.join(" ").toLowerCase();for(const r of rules){if(r.m.some(m=>c.includes(m)))return r.l;}return null;};
const clBank=row=>{if((row["Type"]||"").trim())return{line:row["Type"].trim(),conf:"mapped"};const l=mRule(BKRULES,row["Name"]||"",row["Memo/Description"]||"",row["Split"]||"");return l?{line:l,conf:"auto"}:{line:null,conf:"unknown"};};
const clInv=row=>{if((row["Cash Inflows"]||"").trim())return{line:row["Cash Inflows"].trim(),conf:"mapped"};const prod=(row["Service/Product"]||"").toLowerCase(),staff=(row["Staff"]||"").toLowerCase().trim();const tax=pAmt(row["Tax"]),total=pAmt(row["Total Due"]);if(!total)return{line:null,conf:"skip"};const pl=mRule(INVRULES,prod);if(pl)return{line:pl,conf:"auto"};if(tax&&Math.abs(tax)>0)return{line:"Skincare Products",conf:"auto"};if(SMAP[staff])return{line:SMAP[staff],conf:"auto"};return{line:null,conf:"unknown"};};

const parseFcExp=text=>{
  const tot={};Object.values(OUTMAP).forEach(id=>{tot[id]=pad([],NW);});
  text.split("\n").forEach((line,li)=>{
    if(li===0||!line.trim())return;
    const cols=csvSplit(line);if(cols.length<5)return;
    const mr=(cols[4]||"").replace(/^"|"$/g,"").trim();
    const amt=Math.abs(parseFloat((cols[3]||"").replace(/[^0-9.]/g,""))||0);
    const ds=(cols[2]||"").trim();
    if(!mr||!amt)return;
    const ok=Object.keys(OUTMAP).find(k=>k.trim().toLowerCase()===mr.toLowerCase());
    if(!ok)return;
    const wi=d2wi(ds);
    if(wi>=0&&wi<NW&&WKS[wi].fc)tot[OUTMAP[ok]][wi]=(tot[OUTMAP[ok]][wi]||0)+amt;
  });
  Object.keys(tot).forEach(id=>{tot[id]=tot[id].map(v=>v||null);});return tot;
};

const parseFcInf=text=>{
  const lines=text.trim().split("\n").filter(l=>l.trim());if(lines.length<2)return{};
  const sep=lines[0].includes("\t")?"\t":",";
  const rh=lines[0].split(sep).map(h=>h.trim().replace(/"/g,""));
  const wh=rh.slice(2);
  const hwi=wh.map(h=>{const d=pDate(h);if(!d)return -1;for(let i=0;i<WKS.length;i++){const s=new Date(WKS[i].s),e=new Date(WKS[i].e);const y=d.getFullYear(),mo=d.getMonth(),dy=d.getDate(),sy=s.getFullYear(),sm=s.getMonth(),sd=s.getDate(),ey=e.getFullYear(),em=e.getMonth(),ed=e.getDate();if(((y>sy)||(y===sy&&mo>sm)||(y===sy&&mo===sm&&dy>=sd))&&((y<ey)||(y===ey&&mo<em)||(y===ey&&mo===em&&dy<=ed)))return i;}return -1;});
  const res={};Object.values(INMAP).forEach(id=>{res[id]=pad([],NW);});
  const tox=pad([],NW),wl=pad([],NW);let sec=null;
  lines.slice(1).forEach(line=>{
    const cols=sep==="\t"?line.split("\t").map(c=>c.trim()):csvSplit(line);
    const lbl=(cols[0]||"").trim(),rpd=pAmt(cols[1]),lb=lbl.toLowerCase();
    if(lb.includes("tox membership")&&!rpd){sec="tox";return;}
    if((lb.includes("weightloss")||lb.includes("weight loss"))&&!rpd){sec="wl";return;}
    if(!lb)return;
    const sk=Object.keys(SMAP).find(k=>lb===k);
    if(sk&&rpd){
      const rate=SRATES[SMAP[sk]]||rpd,id=INMAP[SMAP[sk]];
      wh.forEach((_,hi)=>{const wi=hwi[hi];if(wi<0||!WKS[wi].fc)return;const days=pAmt(cols[hi+2]);if(!days)return;res[id][wi]=(res[id][wi]||0)+Math.round(days*rate);res["inj"][wi]=(res["inj"][wi]||0)+Math.round(days*rate);});
      sec=null;return;
    }
    if(sec==="tox"&&(lb==="new"||lb.includes("re-occur"))){wh.forEach((_,hi)=>{const wi=hwi[hi];if(wi<0||!WKS[wi].fc)return;const q=pAmt(cols[hi+2]);if(q)tox[wi]=(tox[wi]||0)+q;});return;}
    if(sec==="wl"&&(lb==="new"||lb.includes("re-occur"))){wh.forEach((_,hi)=>{const wi=hwi[hi];if(wi<0||!WKS[wi].fc)return;const q=pAmt(cols[hi+2]);if(q)wl[wi]=(wl[wi]||0)+q;});return;}
  });
  tox.forEach((q,i)=>{if(q)res["tox"][i]=Math.round(q*TP);});
  wl.forEach((q,i)=>{if(q)res["wlm"][i]=Math.round(q*WP);});
  Object.keys(res).forEach(id=>{res[id]=res[id].map(v=>v||null);});return res;
};

const fetchSh=async gid=>{
  const res=await fetch(`${WEBHOOK}?gid=${gid}`);
  if(!res.ok)throw new Error(`HTTP ${res.status}`);
  const t=await res.text();
  if(!t||t.length<5)throw new Error("Empty response");
  return t;
};

function KPI({label,value,sub,color,bg}){
  return React.createElement("div",{style:{background:bg,border:"1px solid #e2e8f0",borderRadius:10,padding:"10px 14px",flex:1,minWidth:130}},

    sub&&React.createElement("div",{style:{fontSize:10,color:"#64748b",marginTop:2}},sub)
  );
}

function App(){
  const [tab,setTab]=useState("table");
  const [inf,setInf]=useState(ININ);
  const [out,setOut]=useState(INOUT);
  const [fcSnap,setFcSnap]=useState(null);
  const [page,setPage]=useState(0);
  const [coll,setColl]=useState({});
  const [ec,setEc]=useState(null);
  const [ev,setEv]=useState("");
  const [ss,setSs]=useState({anb:null,inv:null,fc:null});
  const [msg,setMsg]=useState(null);
  const [unkM,setUnkM]=useState(false);
  const [pend,setPend]=useState({type:null,rows:[],wi:null,unk:[]});
  const [mm,setMm]=useState({});
  const [pm,setPm]=useState(false);
  const [pe,setPe]=useState("");
  const [pi,setPi]=useState("");

  const iT=useMemo(()=>Array.from({length:NW},(_,i)=>inf.reduce((s,r)=>s+(r.v[i]||0),0)),[inf]);
  const oT=useMemo(()=>Array.from({length:NW},(_,i)=>out.flatMap(s=>s.rows).reduce((s,r)=>s+(r.v[i]||0),0)),[out]);
  const bBal=useMemo(()=>{const b=[...BB];for(let i=1;i<NW;i++)b[i]=b[i-1]+iT[i-1]-oT[i-1];return b;},[iT,oT]);
  const eBal=useMemo(()=>Array.from({length:NW},(_,i)=>bBal[i]+iT[i]-oT[i]),[bBal,iT,oT]);
  const tp=Math.ceil(NW/WPP);
  const pw=WKS.slice(page*WPP,(page+1)*WPP).map((w,j)=>({...w,i:page*WPP+j}));
  const cd=WKS.map((w,i)=>({name:w.s,Inflows:iT[i],Outflows:oT[i],Balance:eBal[i]}));

  const apR=(rows,ak,wi)=>{
    const tot={};
    rows.forEach(r=>{if(!r._line)return;const a=pAmt(r[ak]);if(!a)return;tot[r._line]=(tot[r._line]||0)+a;});
    setInf(prev=>prev.map(r=>{const k=Object.keys(INMAP).find(k=>INMAP[k]===r.id);if(!k||tot[k]===undefined)return r;return{...r,v:r.v.map((v,i)=>i===wi?tot[k]:v)};}));
    setOut(prev=>prev.map(s=>({...s,rows:s.rows.map(r=>{const k=Object.keys(OUTMAP).find(k=>OUTMAP[k]===r.id);if(!k||tot[k]===undefined)return r;return{...r,v:r.v.map((v,i)=>i===wi?Math.abs(tot[k]):v);};})})));
  };

  const apF=(em,im)=>{
    setOut(prev=>prev.map(s=>({...s,rows:s.rows.map(r=>{const nv=em[r.id];if(!nv)return r;return{...r,v:r.v.map((old,i)=>WKS[i].fc?(nv[i]??null):old)};})})));
    setInf(prev=>prev.map(r=>{const nv=im[r.id];if(!nv)return r;return{...r,v:r.v.map((old,i)=>WKS[i].fc?(nv[i]??null):old)};}));
    const snap={inflows:{},outflows:{}};
    Object.keys(im).forEach(id=>{snap.inflows[id]=[...im[id]];});
    Object.keys(em).forEach(id=>{snap.outflows[id]=[...em[id]];});
    setFcSnap(snap);
    const ec2=Object.values(em).flat().filter(Boolean).length;
    const ic2=Object.values(im).flat().filter(Boolean).length;
    setSs(s=>({...s,fc:"done"}));
    setMsg(`✓ Forecasts synced — ${ec2} expense, ${ic2} inflow values`);
  };

  const syncANB=async()=>{
    setSs(s=>({...s,anb:"loading"}));setMsg(null);
    try{
      const text=await fetchSh(GID.anb);
      const rows=parseTbl(text);
      const wi=LA;
      const ws=new Date(WKS[wi].s),we=new Date(WKS[wi].e);we.setHours(23,59,59);
      const wr=rows.filter(r=>{const d=pDate(r["Date"]||"");return d&&d>=ws&&d<=we;});
      const cl=wr.map(r=>{const res=clBank(r);return{...r,_line:res.line,_conf:res.conf};});
      const unk=cl.filter(r=>r._conf==="unknown"&&pAmt(r["Amount"]));
      if(unk.length){setPend({type:"anb",rows:cl,wi,unk});setUnkM(true);}
      else{apR(cl,"Amount",wi);setSs(s=>({...s,anb:"done"}));setMsg(`✓ ANB synced to ${WKS[wi].s}–${WKS[wi].e}`);}
    }catch(e){setSs(s=>({...s,anb:"error"}));setMsg(`ANB error: ${e.message}`);}
  };

  const syncInv=async()=>{
    setSs(s=>({...s,inv:"loading"}));setMsg(null);
    try{
      const text=await fetchSh(GID.invoicing);
      const rows=parseTbl(text);
      const wi=LA;
      const ws=new Date(WKS[wi].s),we=new Date(WKS[wi].e);we.setHours(23,59,59);
      const wr=rows.filter(r=>{const d=pDate(r["Date"]||"");return d&&d>=ws&&d<=we;});
      const cl=wr.map(r=>{const res=clInv(r);return{...r,_line:res.line,_conf:res.conf};});
      const unk=cl.filter(r=>r._conf==="unknown"&&pAmt(r["Total Due"]));
      if(unk.length){setPend({type:"inv",rows:cl,wi,unk});setUnkM(true);}
      else{apR(cl,"Total Due",wi);setSs(s=>({...s,inv:"done"}));setMsg(`✓ Invoicing synced to ${WKS[wi].s}–${WKS[wi].e}`);}
    }catch(e){setSs(s=>({...s,inv:"error"}));setMsg(`Invoicing error: ${e.message}`);}

  const syncFc=async()=>{

          el("tbody",null,...pend.unk.map((row,idx)=>{
            const amt=pAmt(row["Amount"]||row["Total Due"]),oi=pend.rows.indexOf(row);

              el("td",{style:{padding:"5px 10px",color:S.muted,maxWidth:160,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},(row["Memo/Description"]||row["Service/Product"]||"—").slice(0,40)),
              el("td",{style:{padding:"5px 10px",fontWeight:600,color:amt<0?"#b91c1c":"#16a34a",whiteSpace:"nowrap"}},fmt(amt)),
              el("td",{style:{padding:"5px 10px"}},
                el("select",{value:mm[oi]||"",onChange:e=>setMm(m=>({...m,[oi]:e.target.value})),style:{width:"100%",padding:"4px 8px",borderRadius:6,border:"1px solid #e2e8f0",fontSize:12,background:"#fff"}},
                  el("option",{value:""},"— Skip —"),

      el("div",{style:{display:"flex",gap:8,justifyContent:"flex-end",marginTop:14}},
        el("button",{onClick:()=>{setUnkM(false);setMm({});setSs(s=>({...s,[pend.type]:null}));},style:{padding:"8px 16px",borderRadius:8,border:"1px solid #e2e8f0",background:"#f1f5f9",cursor:"pointer",fontSize:13,color:"#475569"}},"Cancel"),

      !fcSnap
        ?el("div",{style:{background:"#fff",borderRadius:12,border:"1px solid #e2e8f0",padding:32,textAlign:"center",color:S.muted}},el("div",{style:{fontSize:32,marginBottom:8}},"🔮"),el("div",{style:{fontWeight:600,marginBottom:4}},"No forecast data yet"),el("div",{style:{fontSize:12}},"Click Sync Forecasts or Paste Forecasts."))
        :el("div",null,
          el("div",{style:{fontWeight:700,fontSize:15,marginBottom:12}},"Forecast vs Actual — Last 6 Weeks"),
          el("div",{style:{overflowX:"auto"}},
            el("table",{style:{borderCollapse:"collapse",minWidth:"100%",fontSize:12}},
              el("thead",null,el("tr",{style:{background:"#f8fafc"}},
                el("th",{style:{...lb(false,false,S.muted),fontSize:11,padding:"6px 8px",fontWeight:600}},"Line"),
                ...vwks.flatMap(w=>[
                  el("th",{key:`f${w.i}`,style:{padding:"4px 8px",textAlign:"right",minWidth:78,fontSize:10,fontWeight:600,color:S.purple,background:S.pBg,borderLeft:"1px solid #e2e8f0",whiteSpace:"nowrap"}},`Fcst ${w.s}`),
                  el("th",{key:`a${w.i}`,style:{padding:"4px 8px",textAlign:"right",minWidth:78,fontSize:10,fontWeight:600,color:"#1d4ed8",background:S.bBg,borderLeft:"1px solid #e2e8f0",whiteSpace:"nowrap"}},`Act ${w.s}`),
                  el("th",{key:`d${w.i}`,style:{padding:"4px 8px",textAlign:"right",minWidth:65,fontSize:10,fontWeight:600,color:S.muted,background:"#f8fafc",borderLeft:"1px solid #e2e8f0",whiteSpace:"nowrap"}},"Δ"),
                ])
              )),
              el("tbody",null,...vrows.map((row,ri)=>
                el("tr",{key:ri,style:{borderBottom:"1px solid #f1f5f9",background:row.sub?"#fafafa":"#fff"}},
                  el("td",{style:lb(row.sub,false)},row.label),
                  ...vwks.flatMap(w=>{
                    const fc=row.fc[w.i]||null,ac=row.act[w.i]||null,delta=(ac||0)-(fc||0);
                    const good=row.type==="in"?delta>=0:delta<=0,dc=delta===0||(!ac&&!fc)?S.muted:good?S.green:S.red;

                      el("td",{key:`f${w.i}`,style:{padding:"3px 8px",textAlign:"right",background:S.pBg,borderLeft:"1px solid #e2e8f0",color:S.purple}},fmt(fc)),
                      el("td",{key:`a${w.i}`,style:{padding:"3px 8px",textAlign:"right",background:S.bBg,borderLeft:"1px solid #e2e8f0",color:"#1d4ed8",fontWeight:500}},fmt(ac)),

    tab==="chart"&&el("div",{style:{padding:16}},
      el("div",{style:{background:"#fff",borderRadius:12,border:"1px solid #e2e8f0",padding:16,marginBottom:12}},
        el("div",{style:{fontWeight:600,marginBottom:10,fontSize:13}},"Balance · Inflows · Outflows"),
        el(ResponsiveContainer,{width:"100%",height:220},
          el(LineChart,{data:cd},

            el(YAxis,{tickFormatter:v=>`$${(v/1000).toFixed(0)}k`,tick:{fontSize:10,fill:S.muted}}),
