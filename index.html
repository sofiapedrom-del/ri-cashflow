const dateToWeekIdx = str => { const d=parseDate(str); if(!d) return -1; const y=d.getFullYear(),mo=d.getMonth(),dy=d.getDate(); for(let i=0;i<WEEKS.length;i++){const s=new Date(WEEKS[i].s),e=new Date(WEEKS[i].e);const sy=s.getFullYear(),sm=s.getMonth(),sd=s.getDate(),ey=e.getFullYear(),em=e.getMonth(),ed=e.getDate();if(((y>sy)||(y===sy&&mo>sm)||(y===sy&&mo===sm&&dy>=sd))&&((y<ey)||(y===ey&&mo<em)||(y===ey&&mo===em&&dy<=ed)))return i;} return -1; };

const parseFcExpenses = text => { const totals={}; Object.values(OUT_MAP).forEach(id=>{totals[id]=pad([],NW);}); text.split("\n").forEach((line,li)=>{if(li===0||!line.trim())return;const cols=csvSplit(line);if(cols.length<5)return;const mapRaw=(cols[4]||"").replace(/^"|"$/g,"").trim();const amt=Math.abs(parseFloat((cols[3]||"").replace(/[^0-9.]/g,""))||0);const dateStr=(cols[2]||"").trim();if(!mapRaw||!amt)return;const outKey=Object.keys(OUT_MAP).find(k=>k.trim().toLowerCase()===mapRaw.toLowerCase());if(!outKey)return;const wi=dateToWeekIdx(dateStr);if(wi>=0&&wi<NW&&WEEKS[wi].fc)totals[OUT_MAP[outKey]][wi]=(totals[OUT_MAP[outKey]][wi]||0)+amt;}); Object.keys(totals).forEach(id=>{totals[id]=totals[id].map(v=>v||null);}); return totals; };

const parseFcInflows = text => { const lines=text.trim().split("\n").filter(l=>l.trim()); if(lines.length<2) return {}; const sep=lines[0].includes("\t")?"\t":","; const rawHdrs=lines[0].split(sep).map(h=>h.trim().replace(/"/g,"")); const wkHdrs=rawHdrs.slice(2); const hdrWi=wkHdrs.map(h=>{const d=parseDate(h);if(!d)return -1;for(let i=0;i<WEEKS.length;i++){const s=new Date(WEEKS[i].s),e=new Date(WEEKS[i].e);const y=d.getFullYear(),mo=d.getMonth(),dy=d.getDate(),sy=s.getFullYear(),sm=s.getMonth(),sd=s.getDate(),ey=e.getFullYear(),em=e.getMonth(),ed=e.getDate();if(((y>sy)||(y===sy&&mo>sm)||(y===sy&&mo===sm&&dy>=sd))&&((y<ey)||(y===ey&&mo<em)||(y===ey&&mo===em&&dy<=ed)))return i;}return -1;}); const res={}; Object.values(IN_MAP).forEach(id=>{res[id]=pad([],NW);}); const toxAcc=pad([],NW),wlAcc=pad([],NW); let sec=null; lines.slice(1).forEach(line=>{const cols=sep==="\t"?line.split("\t").map(c=>c.trim()):csvSplit(line);const label=(cols[0]||"").trim(),rpd=parseAmt(cols[1]),lbl=label.toLowerCase();if(lbl.includes("tox membership")&&!rpd){sec="tox";return;}if((lbl.includes("weightloss")||lbl.includes("weight loss"))&&!rpd){sec="wl";return;}if(!lbl)return;const sk=Object.keys(STAFF_MAP).find(k=>lbl===k);if(sk&&rpd){const rate=STAFF_RATES[STAFF_MAP[sk]]||rpd,id=IN_MAP[STAFF_MAP[sk]];wkHdrs.forEach((_,hi)=>{const wi=hdrWi[hi];if(wi<0||!WEEKS[wi].fc)return;const days=parseAmt(cols[hi+2]);if(!days)return;res[id][wi]=(res[id][wi]||0)+Math.round(days*rate);res["inj"][wi]=(res["inj"][wi]||0)+Math.round(days*rate);});sec=null;return;}if(sec==="tox"&&(lbl==="new"||lbl.includes("re-occur"))){wkHdrs.forEach((_,hi)=>{const wi=hdrWi[hi];if(wi<0||!WEEKS[wi].fc)return;const q=parseAmt(cols[hi+2]);if(q)toxAcc[wi]=(toxAcc[wi]||0)+q;});return;}if(sec==="wl"&&(lbl==="new"||lbl.includes("re-occur"))){wkHdrs.forEach((_,hi)=>{const wi=hdrWi[hi];if(wi<0||!WEEKS[wi].fc)return;const q=parseAmt(cols[hi+2]);if(q)wlAcc[wi]=(wlAcc[wi]||0)+q;});return;}}); toxAcc.forEach((q,i)=>{if(q)res["tox"][i]=Math.round(q*TOX_PRICE);}); wlAcc.forEach((q,i)=>{if(q)res["wlm"][i]=Math.round(q*WL_PRICE);}); Object.keys(res).forEach(id=>{res[id]=res[id].map(v=>v||null);}); return res; };

function App() {
  const [tab,setTab]=useState("table");

  const [fcSnapshot,setFcSnapshot]=useState(null);

  const applyRows=(rows,amtKey,wi)=>{const totals={};rows.forEach(r=>{if(!r._line)return;const a=parseAmt(r[amtKey]);if(!a)return;totals[r._line]=(totals[r._line]||0)+a;});setInflows(prev=>prev.map(r=>{const k=Object.keys(IN_MAP).find(k=>IN_MAP[k]===r.id);if(!k||totals[k]===undefined)return r;return{...r,v:r.v.map((v,i)=>i===wi?totals[k]:v)};}));setOutflows(prev=>prev.map(s=>({...s,rows:s.rows.map(r=>{const k=Object.keys(OUT_MAP).find(k=>OUT_MAP[k]===r.id);if(!k||totals[k]===undefined)return r;return{...r,v:r.v.map((v,i)=>i===wi?Math.abs(totals[k]):v)};})}))); };
  const applyFc=(expMap,infMap)=>{setOutflows(prev=>prev.map(s=>({...s,rows:s.rows.map(r=>{const nv=expMap[r.id];if(!nv)return r;return{...r,v:r.v.map((old,i)=>WEEKS[i].fc?(nv[i]??null):old));})})));setInflows(prev=>prev.map(r=>{const nv=infMap[r.id];if(!nv)return r;return{...r,v:r.v.map((old,i)=>WEEKS[i].fc?(nv[i]??null):old));}));const snap={inflows:{},outflows:{}};Object.keys(infMap).forEach(id=>{snap.inflows[id]=[...infMap[id]];});Object.keys(expMap).forEach(id=>{snap.outflows[id]=[...expMap[id]];});setFcSnapshot(snap);const ec=Object.values(expMap).flat().filter(Boolean).length;const ic=Object.values(infMap).flat().filter(Boolean).length;setSyncState(s=>({...s,fc:"done"}));setSyncMsg(`✓ Forecasts synced — ${ec} expense values, ${ic} inflow values`);};
